baseURL = 'https://nenssi.github.io/sql_ua/'
theme = 'ananke'

# Основной язык
defaultContentLanguage = 'uk'

[languages]
  [languages.uk]
    languageName = 'Українська'
    title = 'Oksana Kosinova'
    contentDir = 'content/uk'
    weight = 1
    [languages.uk.params]
      show_social_icons = true
		
  [languages.en]
    languageName = 'English'
    title = 'Oksana Kosinova'
    contentDir = 'content/en'
    weight = 2
    [languages.en.params]
      show_social_icons = true
		
