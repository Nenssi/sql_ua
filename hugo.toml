baseURL = 'https://nenssi.github.io/sql_ua/'
theme = 'ananke'

# Основной язык
defaultContentLanguage = 'uk'

[languages]
  [languages.uk]
    languageName = 'Українська'
    title = 'Oksana Kosinova'
    contentDir = 'content/uk'
    weight = 1

  [languages.en]
    languageName = 'English'
    title = 'Oksana Kosinova'
    contentDir = 'content/en'
    weight = 2

# Меню UA
[[languages.uk.menu.main]]
    name = "Про мене"
    url = "/about/"
    weight = 1

[[languages.uk.menu.main]]
    name = "Блог"
    url = "/posts/"
    weight = 2

[[languages.uk.menu.main]]
    name = "Контакти"
    url = "/contact/"
    weight = 3

# Меню EN
[[languages.en.menu.main]]
    name = "About Me"
    url = "/about/"
    weight = 1

[[languages.en.menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 2

[[languages.en.menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 3

[params]
  background_color_class = "bg-black"
  # Эти две строки заставят иконки показаться:
  show_social_icons = true
  social_follow = true 

  [[params.social]]
    name = "telegram"
    url = "https://t.me/Nenssi7"